<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Any Dream Text</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root { --primary: #00f2fe; --accent: #7000ff; --bg: #05050a; }
* { box-sizing: border-box; } 

body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; 
    display: flex; flex-direction: column; overflow-x: hidden; 
}

.bg-animation {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: radial-gradient(circle at center, #1a0b2e 0%, #05050a 100%);
}

/* Ads Styling */
.top-ad-banner { width: 100%; display: flex; justify-content: center; padding: 10px 0; background: rgba(0,0,0,0.3); }
.ad-container-fixed { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); width: 160px; height: 300px; z-index: 9999; }

header h1 { 
    text-align: center; margin: 20px 0 10px; font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5vw, 2.8rem); 
    background: linear-gradient(to right, var(--primary), #bc4eff, var(--primary)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px;
}

.tabs-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 0 10px; }
.tab-btn { 
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
    padding: 12px 25px; border-radius: 50px; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s; 
}
.tab-btn.active { background: linear-gradient(45deg, var(--accent), var(--primary)); border: none; box-shadow: 0 0 20px rgba(112, 0, 255, 0.4); }

.main-content { flex: 1; padding: 0 15px; } 
.container { 
    max-width: 850px; margin: 0 auto 30px; padding: 25px; 
    background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); 
    border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); 
}

.page { display: none; }
.page.active { display: block; }

input { 
    width: 100%; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); 
    padding: 18px; border-radius: 15px; color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
}

.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; margin-top: 30px; }
.name-card { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
.copy-icon { color: var(--primary); cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; background: rgba(0,242,254,0.1); border-radius: 10px; }

.rewards-section { text-align: center; padding: 20px 0; margin-top: auto; }
.rewards-btn {
  background: linear-gradient(45deg, var(--primary), var(--accent));
  color: #fff; border: none; padding: 15px 45px; font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer;
  box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); transition: 0.3s;
  animation: pulseRewards 1.5s infinite; display: inline-block;
}

@keyframes pulseRewards { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

footer { text-align: center; padding: 15px; font-size: 0.85rem; color: #666; }
#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 10000; }

@media (max-width: 1150px) { .ad-container-fixed { display: none; } }
@media (max-width: 768px) { .result-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<script src="https://pl29003965.profitablecpmratenetwork.com/74/5f/23/745f235a907bf49222a0ff5f007cd98d.js"></script>

<div class="bg-animation"></div>

<div class="top-ad-banner">
    <script type="text/javascript">
        atOptions = { 'key' : '08bb1a4c2a21136990ea70d24b9bdadb', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
    </script>
    <script type="text/javascript" src="https://www.highperformanceformat.com/08bb1a4c2a21136990ea70d24b9bdadb/invoke.js"></script>
</div>

<div class="ad-container-fixed">
    <script type="text/javascript">
        atOptions = { 'key' : '7d591ccef8f1ed96e67eae6876ddb7b4', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
    </script>
    <script type="text/javascript" src="https://www.highperformanceformat.com/7d591ccef8f1ed96e67eae6876ddb7b4/invoke.js"></script>
</div>

<div class="main-content">
    <header><h1>Generate Any Dream Text</h1></header>

    <div class="tabs-container">
      <button class="tab-btn active" onclick="showPage('dreamPage', this)">Dream Generator</button>
      <button class="tab-btn" onclick="showPage('customPage', this)">Create Your Style</button>
    </div>

    <div class="container">
      <div id="dreamPage" class="page active">
        <input type="text" id="dreamInput" placeholder="Type name here..." oninput="generateAll()">
        <div class="result-grid" id="dreamOutput"></div>
      </div>

      <div id="customPage" class="page">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <input type="text" id="customInput" placeholder="Design your own...">
          <button class="tab-btn" style="background:var(--primary);color:#000;border-radius:12px;" onclick="copyText(document.getElementById('customInput').value)">Copy</button>
        </div>
        <div id="symbolGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding:10px; border-radius:15px;"></div>
      </div>
    </div>
</div>

<div class="rewards-section">
    <button class="rewards-btn" onclick="window.open('https://www.profitablecpmratenetwork.com/qu5m4ap1?key=77a87a9ee7e244edda9bf74d2d52b8ea', '_blank')">💎 FREE DIAMONDS & CASH 💎</button>
</div>

<footer>© 2026 Dream Text Studio</footer>

<div id="toast">Magic Copied! ✨</div>

<script>
const charMap = {
  'a': ['å', 'α', 'A', '卂'], 'b': ['ß', 'B', '乃'], 'c': ['ç', '©', '匚'], 'd': ['đ', 'Δ', '刀'], 'e': ['€', '£', '乇'], 'f': ['ƒ', 'F', '下'], 'g': ['ɢ', 'G', 'ム'], 'h': ['ħ', 'H', '卄'], 'i': ['ï', 'ι', '丨'], 'j': ['ʝ', 'J', 'ﾌ'], 'k': ['κ', 'K', 'Ҝ'], 'l': ['ℓ', 'L', 'ㄥ'], 'm': ['м', 'M', '爪'], 'n': ['и', 'N', '几'], 'o': ['ø', 'O', 'ㄖ'], 'p': ['ρ', 'P', '卩'], 'q': ['ǫ', 'Q', 'ҩ'], 'r': ['я', 'R', '尺'], 's': ['§', 'S', '丂'], 't': ['т', 'T', 'ㄒ'], 'u': ['μ', 'U', 'ㄩ'], 'v': ['ν', 'V', '√'], 'w': ['ω', 'W', '山'], 'x': ['χ', 'X', '乂'], 'y': ['γ', 'Y', 'ㄚ'], 'z': ['ʐ', 'Z', '乙']
};

const decos = [
  ["꧁༒☬", "☬༒꧂"], ["亗", "亗"], ["〆", "〆"], ["𓆩", "𓆪"], ["★彡", "彡★"], ["⚡", "⚡"], ["☠︎", "☠︎"], ["⚔️", "⚔️"],
  ["༺", "༻"], ["╰‿╯", ""], ["×͜×", ""], ["v⃒ ", ""], ["『", "』"], ["【", "】"], ["✧", "✧"], ["❂", "❂"]
];

function generateAll() {
  const input = document.getElementById('dreamInput').value.trim();
  const out = document.getElementById('dreamOutput');
  out.innerHTML = ""; if (!input) return;
  for (let i = 0; i < 60; i++) {
    const d = decos[i % decos.length] || ["", ""];
    const styled = input.split('').map(char => { const l = char.toLowerCase(); return charMap[l] ? charMap[l][i % charMap[l].length] : char; }).join('');
    const final = `${d[0]}${styled}${d[1]}`;
    const card = document.createElement('div'); card.className = 'name-card';
    card.innerHTML = `<span>${final}</span><div class="copy-icon" onclick="copyText('${final.replace(/'/g, "\\'")}')"><i class="fas fa-magic"></i></div>`;
    out.appendChild(card);
  }
}

const symbols = ['亗','꧁','꧂','༒','☬','彡','★','〆','𓆩','𓆪','⚡','☠︎','⚔️','༺','༻','ⓐ','ⓑ','ⓒ','ⓓ','ⓔ','ⓕ','ⓖ','ⓗ','ⓘ','ⓙ','ⓚ','ⓛ','ⓜ','ⓝ','ⓞ','ⓟ','ⓠ','ⓡ','ⓢ','ⓣ','ⓤ','ⓥ','ⓦ','ⓧ','ⓨ','ⓩ','å','ą','α','Δ','ß','β','ç','¢','©','đ','ε','ƒ','ɢ','ħ','ï','ʝ','κ','ℓ','м','и','ø','ρ','я','§','т','μ','ν','ω','χ','γ','ʐ','卂','乃','匚','刀','乇','下','ム','卄','丨','ﾌ','Ҝ','ㄥ','爪','几','ㄖ','卩','ҩ','尺','丂','ㄒ','ㄩ','√','山','乂','ㄚ','乙'];
const sGrid = document.getElementById('symbolGrid');
symbols.forEach(s => {
  const d = document.createElement('div');
  d.style = "background: rgba(255,255,255,0.05); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 1.1rem;";
  d.innerText = s; d.onclick = () => document.getElementById('customInput').value += s;
  sGrid.appendChild(d);
});

function showPage(id, b) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(id).classList.add('active'); b.classList.add('active');
}

function copyText(t) {
  const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
  const toast = document.getElementById('toast'); toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2000);
}
</script>
</body>
</html>
